[build]
  command = "wget -q https://github.com/quarto-dev/quarto-cli/releases/download/v${QUARTO_VERSION}/quarto-${QUARTO_VERSION}-linux-amd64.tar.gz -O quarto.tar.gz && mkdir quarto-bin && tar -xzf quarto.tar.gz -C quarto-bin --strip-components=1 && ./quarto-bin/bin/quarto render"
  publish = "_dist"

[build.environment]
  QUARTO_VERSION = "1.9.37"
