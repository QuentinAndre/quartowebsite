[build]
  command = "wget -q https://github.com/quarto-dev/quarto-cli/releases/download/v${QUARTO_VERSION}/quarto-${QUARTO_VERSION}-linux-amd64.tar.gz -O /tmp/quarto.tar.gz && mkdir -p /tmp/quarto-bin && tar -xzf /tmp/quarto.tar.gz -C /tmp/quarto-bin --strip-components=1 && /tmp/quarto-bin/bin/quarto render"
  publish = "_site"

[build.environment]
  QUARTO_VERSION = "1.9.37"

# Serve the LLM-readable Markdown manuscripts and llms.txt as UTF-8 so accented
# characters (e.g. "André") render correctly when viewed inline in a browser.
# The files are already UTF-8 on disk; this just makes the charset explicit.
[[headers]]
  for = "/*.md"
  [headers.values]
    Content-Type = "text/markdown; charset=utf-8"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
